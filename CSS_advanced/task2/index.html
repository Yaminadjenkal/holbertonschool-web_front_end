<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>SmileSchool</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,700" rel="stylesheet">
  </head>

  <body>

    <!-- HEADER -->
    <header>
      <div class="logo">
        <img src="images/logo.png" alt="SmileSchool logo">
        <h1>SmileSchool</h1>
      </div>

      <nav>
        <ul>
          <li><a href="#">COURSES</a></li>
          <li><a href="#">PRICING</a></li>
          <li><a href="#">LOGIN</a></li>
        </ul>
      </nav>
    </header>

    <!-- HERO -->
    <section class="hero">
      <h1>Get schooled</h1>

      <div class="keywords">
        <span>SMILES</span>
        <span>GRIN</span>
        <span>LAUGH</span>
      </div>

      <button>REGISTER FOR FREE</button>

      <h2 class="subtitle">
        <span class="purple">Learn</span> from the pros
      </h2>

      <div class="profiles">
        <div class="profile">
          <img src="images/pro_1.jpg" alt="">
          <h3>Phillip Massey</h3>
          <p>« Smile of the year » 2018–2019</p>
        </div>

        <div class="profile">
          <img src="images/pro_2.jpg" alt="">
          <h3>Nannie Lawrence</h3>
          <p>« Best little smile » 2017</p>
        </div>

        <div class="profile">
          <img src="images/pro_3.jpg" alt="">
          <h3>Bruce Walters</h3>
          <p>« Best Friend Smile » live performance 2019</p>
        </div>

        <div class="profile">
          <img src="images/pro_4.jpg" alt="">
          <h3>Henry Hughes</h3>
          <p>24h smiles winner 2016–2019</p>
        </div>
      </div>
    </section>

  </body>
</html>
