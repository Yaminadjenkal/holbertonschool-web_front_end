<!DOCTYPE html>
<html lang="en" dir="ltr">

    <head>

        <meta charset="utf-8" />
        <title>Task 11</title>

        <!-- Load jQuery (slim + minified version) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <script type="application/javascript">
            $(document).ready(function () {
                // add one post row
                function addPostRow(data) {
                    $("body").append(
                        $("<p></p>").append(
                            $("<span></span>").text(
                                `Post created with id ${data.id}, title: ${data.title}, author: ${data.author}`
                            )
                        )
                    );
                }

                //list all post
                function listPosts(){
                    $.get(
                        "http://172.24.2.127:3000/posts",

                        function (response) {
                            response.forEach(function (post) {
                                addPostRow(post);
                            });
                        }
                    ).fail(function () {
                        alert("Server Error");
                    });
                }

                // call function on page load
                listPosts();

                function buildForm() {
                    const form = $("<form></form>");

                    // author div
                    form.append(
                        $("<div><div>").append(
                            $("<label for='author'></label>").text("Author"),
                            $("<input type='text' id='author'>")
                            )
                    );
                    
                    // title div
                    form.append(
                        $("<div><div>").append(
                        $("<label for='title'></label>").text("Title"),
                        $("<textarea id='title'></textarea>")
                        )
                    );

                    // submit button
                    form.append(
                        $("<input type='submit'>").val("Submit")
                    );

                    // submit event
                    form.submit(function (event) {
                        event.preventDefault();
                        sendForm();
                    });

                    $("body").append(form);
                }

                // send form
                function sendForm(){
                    // message after form
                    $("form").after(
                        $("<p></p>").text("About to send the query to the API")
                    );

                    // data object
                    const data = {
                        title: $("#title").val(),
                        author: $("#author").val()
                    };

                    // POST request
                    $.post(
                        "http://172.24.2.127:3000/posts",
                        data,

                        function (response) {
                            addPostRow(response);
                        }
                    ).fail(function () {
                        alert("Error sending the POST query");
                    });              
                }

                // page load
                listPosts();
                buildForm();
            });
        </script>
    </head>

    <body>

    </body>

</html>
