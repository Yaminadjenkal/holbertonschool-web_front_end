<!DOCTYPE html>
<html lang="en" dir="ltr">

    <head>

        <meta charset="utf-8" />
        <title>Task 10</title>

        <!-- Load jQuery (slim + minified version) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <script type="application/javascript">
            $(document).ready(function () {
                // add one post row
                function addPostRow(data) {
                    $("body").append(
                        $("<p></p>").append(
                            $("<span></span>").text(
                                `Post created with id ${data.id}, title: ${data.title}, author: ${data.author}`
                            )
                        )
                    );
                }

                //list all post
                function listPosts(){
                    $.get(
                        "http://172.24.2.127:3000/posts",

                        function (response) {
                            response.forEach(function (post) {
                                addPostRow(post);
                            });
                        }
                    ).fail(function () {
                        alert("Server Error");
                    });
                }

                // call function on page load
                listPosts();
            });
        </script>
    </head>

    <body>

    </body>

</html>
