<!DOCTYPE html>
<html lang="en" dir="ltr">

    <head>

        <meta charset="utf-8" />
        <title>Task 4</title>

        <!-- Load jQuery (slim + minified version) -->
        <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

        <script type="application/javascript">
            $(document).ready(function () {
                function createFamilyTree() {
                    $("body").append(
                        $("<table></table>").append(
                            $("<thead></thead>").append(
                                $("<tr></tr>").append(
                                    $("<th></th>").text("Firstname"),
                                    $("<th></th>").text("Lastname"),
                                )
                            ),
                            $("<tbody></tbody>").append(
                                $("<tr></tr>").append(
                                    $("<td></td").text("Guillaume"),
                                    $("<td></td").text("Salva")  
                                ),
                                $("<tr></tr>").append(
                                    $("<td></td").text("Paulette"),
                                    $("<td></td").text("Salva")  
                                ),
                                $("<tr></tr>").append(
                                    $("<td></td").text("Antoine"),
                                    $("<td></td").text("Salva")  
                                )
                            )
                        )
                    );
                }

                function replaceFamilyTree() {
                    $("tbody").html(
                        $("<tr></tr>").append(
                            $("<tr></tr>").text("Gerard"),
                            $("<tr></tr>").text("Bonissa")
                        )
                    );
                }
                // call to function
                createFamilyTree();
                replaceFamilyTree();
            });
        </script>
    </head>

    <body>

    </body>

</html>
