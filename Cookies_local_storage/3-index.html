<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task 3 - Delete Cookies & Mini App</title>
  </head>

  <body onload="showWelcomeMessageOrForm()">

    <!-- LOGIN FORM -->
    <div id="loginForm" style="display: none;">
      <h2>Login to the website</h2>

      <input type="text" id="firstname" placeholder="Firstname" />
      <br /><br />

      <input type="text" id="email" placeholder="Email" />
      <br /><br />

      <button onclick="setCookies()">Log me in</button>
    </div>

    <script>
      /* ------------------------------
         COOKIE HELPERS
      ------------------------------ */

      function setCookies() {
        const firstname = document.getElementById("firstname").value;
        const email = document.getElementById("email").value;

        const expiration = new Date();
        expiration.setTime(expiration.getTime() + 10 * 24 * 60 * 60 * 1000);
        const expires = "expires=" + expiration.toUTCString();

        document.cookie = `firstname=${firstname}; ${expires}; path=/`;
        document.cookie = `email=${email}; ${expires}; path=/`;

        showWelcomeMessageOrForm();
      }

      function getCookie(name) {
        const cookies = document.cookie.split(";");

        for (let cookie of cookies) {
          cookie = cookie.trim();
          if (cookie.startsWith(name + "=")) {
            return cookie.substring(name.length + 1);
          }
        }
        return "";
      }

      function deleteCookiesAndShowForm() {
        document.cookie = "firstname=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";
        document.cookie = "email=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/";

        showForm();
      }

      /* ------------------------------
         FORM DISPLAY
      ------------------------------ */

      function showForm() {
        const welcome = document.getElementById("welcomeMessage");
        if (welcome) welcome.remove();

        document.getElementById("loginForm").style.display = "block";
      }

      function hideForm() {
        document.getElementById("loginForm").style.display = "none";
      }

      /* ------------------------------
         WELCOME MESSAGE
      ------------------------------ */

      function showWelcomeMessageOrForm() {
        const firstname = getCookie("firstname");

        if (firstname === "") {
          showForm();
          return;
        }

        hideForm();

        const h1 = document.createElement("h1");
        h1.id = "welcomeMessage";

        const logout = document.createElement("a");
        logout.innerText = "(logout)";
        logout.style.fontStyle = "italic";
        logout.style.fontWeight = "normal";
        logout.style.marginLeft = "10px";
        logout.href = "#";
        logout.onclick = function () {
          deleteCookiesAndShowForm();
        };

        h1.innerText = `Welcome ${firstname} `;
        h1.appendChild(logout);

        document.body.appendChild(h1);
      }
    </script>
  </body>
</html>
