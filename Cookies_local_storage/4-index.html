<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task 4 - Use js-cookie</title>

    <!-- Add js-cookie CDN -->
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.1/dist/js.cookie.min.js"></script>
  </head>

  <body onload="showWelcomeMessageOrForm()">

    <!-- LOGIN FORM -->
    <div id="loginForm" style="display: none;">
      <h2>Login to the website</h2>

      <input type="text" id="firstname" placeholder="Firstname" />
      <br /><br />

      <input type="text" id="email" placeholder="Email" />
      <br /><br />

      <button onclick="setCookiesAndShowWelcomeMessage()">Log me in</button>
    </div>

    <script>
      /* ------------------------------
         SET COOKIES (with js-cookie)
      ------------------------------ */
      function setCookiesAndShowWelcomeMessage() {
        const firstname = document.getElementById("firstname").value;
        const email = document.getElementById("email").value;

        // Cookies expire in 10 days
        Cookies.set("firstname", firstname, { expires: 10, path: "/" });
        Cookies.set("email", email, { expires: 10, path: "/" });

        showWelcomeMessageOrForm();
      }

      /* ------------------------------
         DELETE COOKIES (with js-cookie)
      ------------------------------ */
      function deleteCookiesAndShowForm() {
        Cookies.remove("firstname", { path: "/" });
        Cookies.remove("email", { path: "/" });

        showForm();
      }

      /* ------------------------------
         FORM DISPLAY
      ------------------------------ */
      function showForm() {
        const welcome = document.getElementById("welcomeMessage");
        if (welcome) welcome.remove();

        document.getElementById("loginForm").style.display = "block";
      }

      function hideForm() {
        document.getElementById("loginForm").style.display = "none";
      }

      /* ------------------------------
         WELCOME MESSAGE (JS ONLY)
      ------------------------------ */
      function showWelcomeMessageOrForm() {
        const firstname = Cookies.get("firstname");

        if (!firstname) {
          showForm();
          return;
        }

        hideForm();

        const h1 = document.createElement("h1");
        h1.id = "welcomeMessage";

        const logout = document.createElement("a");
        logout.innerText = "(logout)";
        logout.style.fontStyle = "italic";
        logout.style.fontWeight = "normal";
        logout.style.marginLeft = "10px";
        logout.href = "#";
        logout.onclick = function () {
          deleteCookiesAndShowForm();
        };

        h1.innerText = `Welcome ${firstname} `;
        h1.appendChild(logout);

        document.body.appendChild(h1);
      }
    </script>
  </body>
</html>
