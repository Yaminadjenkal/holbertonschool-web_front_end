<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Task 7 - Advanced Cart with Session Storage</title>
  </head>

  <body>
    <script>
      /* -----------------------------------------
         1. Available items
      ----------------------------------------- */
      const availableItems = ["Shampoo", "Soap", "Sponge", "Water"];

      /* -----------------------------------------
         2. Check if sessionStorage is available
      ----------------------------------------- */
      if (typeof Storage === "undefined") {
        alert("Sorry, your browser does not support Web storage. Try again with a better one");
      } else {
        createStore();
        displayCart();
      }

      /* -----------------------------------------
         3. Get cart from sessionStorage
      ----------------------------------------- */
      function getCartFromStorage() {
        const cart = sessionStorage.getItem("cart");
        return cart ? JSON.parse(cart) : {};
      }

      /* -----------------------------------------
         4. Add item to cart
      ----------------------------------------- */
      function addItemToCart(item) {
        const cart = getCartFromStorage();

        if (cart[item]) {
          cart[item] += 1;
        } else {
          cart[item] = 1;
        }

        sessionStorage.setItem("cart", JSON.stringify(cart));
        displayCart();
      }

      /* -----------------------------------------
         5. Remove item from cart
      ----------------------------------------- */
      function removeItemfromCart(item) {
        const cart = getCartFromStorage();

        if (cart[item]) {
          delete cart[item];
        }

        sessionStorage.setItem("cart", JSON.stringify(cart));
        displayCart();
      }

      /* -----------------------------------------
         6. Clear entire cart
      ----------------------------------------- */
      function clearCart() {
        sessionStorage.clear();
        displayCart();
      }

      /* -----------------------------------------
         7. Create store (list of products)
      ----------------------------------------- */
      function createStore() {
        const h2 = document.createElement("h2");
        h2.innerText = "Available products:";
        document.body.appendChild(h2);

        const ul = document.createElement("ul");

        for (let item of availableItems) {
          const li = document.createElement("li");
          li.innerText = item;

          li.onclick = function () {
            addItemToCart(item);
          };

          ul.appendChild(li);
        }

        document.body.appendChild(ul);
      }

      /* -----------------------------------------
         8. Display cart container
      ----------------------------------------- */
      function displayCart() {
        let h2 = document.getElementById("cart-title");
        if (!h2) {
          h2 = document.createElement("h2");
          h2.id = "cart-title";
          h2.innerText = "Your cart:";
          document.body.appendChild(h2);
        }

        let div = document.getElementById("cart");
        if (!div) {
          div = document.createElement("div");
          div.id = "cart";
          document.body.appendChild(div);
        }

        // Clear previous content
        div.innerHTML = "";

        updateCart();
      }

      /* -----------------------------------------
         9. Update cart content
      ----------------------------------------- */
      function updateCart() {
        const cart = getCartFromStorage();
        const div = document.getElementById("cart");

        const ul = document.createElement("ul");

        // Clear my cart button
        const clearLi = document.createElement("li");
        clearLi.innerText = "Clear my cart";
        clearLi.style.cursor = "pointer";
        clearLi.onclick = clearCart;
        ul.appendChild(clearLi);

        // If empty
        if (Object.keys(cart).length === 0) {
          const emptyLi = document.createElement("li");
          emptyLi.innerText = "Your cart is empty";
          ul.appendChild(emptyLi);
        } else {
          // List items
          for (let item in cart) {
            const li = document.createElement("li");
            li.innerHTML = `${item} x ${cart[item]} `;

            const remove = document.createElement("span");
            remove.innerText = "(remove)";
            remove.style.cursor = "pointer";
            remove.style.marginLeft = "10px";
            remove.style.color = "blue";

            remove.onclick = function () {
              removeItemfromCart(item);
            };

            li.appendChild(remove);
            ul.appendChild(li);
          }
        }

        div.appendChild(ul);
      }
    </script>
  </body>
</html>
